services:
  lobe:
    image: lobehub/lobehub:2.1.53
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3210"
    environment:
      - KEY_VAULTS_SECRET=${KEY_VAULTS_SECRET}
      - JWKS_KEY=${JWKS_KEY}
      - DATABASE_URL=postgresql://${PANEL_DB_USER}:${PANEL_DB_USER_PASSWORD}@${PANEL_DB_HOST}:${PANEL_DB_PORT}/${PANEL_DB_NAME}
      - APP_URL=${APP_URL}
      - INTERNAL_APP_URL=http://localhost:${PANEL_APP_PORT_HTTP}
      - LLM_VISION_IMAGE_USE_BASE64=1
      - REDIS_URL=redis://${PANEL_REDIS_HOST}:${PANEL_REDIS_PORT}
      - REDIS_PASSWORD=${PANEL_REDIS_PASSWORD}
      - REDIS_PREFIX=${REDIS_PREFIX}
      - REDIS_TLS=0
      - AUTH_SECRET=${AUTH_SECRET}
      # - SEARCH_PROVIDERS="searxng"
      # - SEARXNG_URL=
      # - S3_ENDPOINT=
      # - S3_BUCKET=
      # - S3_ENABLE_PATH_STYLE=1
      # - S3_SET_ACL=0
      # - S3_ACCESS_KEY=
      # - S3_ACCESS_KEY_ID=
      # - S3_SECRET_ACCESS_KEY=
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
